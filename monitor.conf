# =============================================================================
# monitor.conf — Configuration for vps_monitor.sh
# =============================================================================

# --- Alert email --------------------------------------------------------------
ALERT_EMAIL="nasarulnaseer13@gmail.com"

# Send a "All Systems Normal" email even when no alerts fire?
# true  = email on every run (good for confirming the script is alive)
# false = only email when something is wrong
ALWAYS_EMAIL=false

# --- Thresholds ---------------------------------------------------------------
CPU_THRESHOLD=85
RAM_THRESHOLD=85
DISK_THRESHOLD=80
ZOMBIE_THRESHOLD=5

# Load average limit = cpu_cores × LOAD_MULTIPLIER
LOAD_MULTIPLIER=1.5

# --- Disk mount points --------------------------------------------------------
DISK_MOUNTS=(
  "/"
)

# --- Services to monitor ------------------------------------------------------
SERVICES=(
  "ssh"
  "cron"
)

# --- Logging ------------------------------------------------------------------
LOG_DIR="/var/log/vps_monitor"
LOG_RETENTION_DAYS=14
