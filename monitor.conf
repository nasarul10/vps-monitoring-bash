# =============================================================================
# monitor.conf — Configuration for vps_monitor.sh
# Edit these values to match your server and preferences.
# =============================================================================

# --- Alert email address ------------------------------------------------------
# All alerts will be sent to this address.
ALERT_EMAIL="you@example.com"

# --- Thresholds ---------------------------------------------------------------
# Alerts fire when usage EQUALS or EXCEEDS these values.

CPU_THRESHOLD=85        # CPU usage % (e.g. 85 = alert when CPU >= 85%)
RAM_THRESHOLD=85        # RAM usage %
DISK_THRESHOLD=80       # Disk usage % (checked per mount point below)
ZOMBIE_THRESHOLD=5      # Number of zombie processes before alerting

# Load average limit = cpu_cores × LOAD_MULTIPLIER
# 1.0 = alert when load equals number of cores (fully loaded)
# 1.5 = allow 50% overcommit before alerting
LOAD_MULTIPLIER=1.5

# --- Disk mount points to monitor ---------------------------------------------
# Add or remove paths as needed.
DISK_MOUNTS=(
  "/"
  "/home"
  "/var"
)

# --- Services to monitor ------------------------------------------------------
# These must be valid systemd service names (checked with systemctl).
# Remove services that are not installed on your server.
SERVICES=(
  "ssh"
  "nginx"
  "cron"
)

# --- Logging ------------------------------------------------------------------
LOG_DIR="/var/log/vps_monitor"   # Directory where log files are stored
LOG_RETENTION_DAYS=14            # Delete logs older than this many days
